<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cartontao</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
        }

        h1 {
            font-size: 62px;
            font-weight: 600;
            color: #111111;
            margin-bottom: 50px;
            letter-spacing: 0.5px;
        }

        .link-item {
            display: block;
            font-size: 20px;
            color: #111111;
            text-decoration: none;
            margin: 14px 0;
            transition: opacity 0.2s ease;
        }

        .link-item:hover {
            opacity: 0.4;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 42px;
            }
            .link-item {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>cartontao</h1>
        <a href="https://instagram.com" target="_blank" class="link-item">Instagram</a>
        <a href="https://twitter.com" target="_blank" class="link-item">Twitter</a>
        <a href="mailto:your-email@example.com" class="link-item">Email</a>
    </div>
</body>
</html>
